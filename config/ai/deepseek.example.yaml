# AI provider profile (ADR 0015) — copy this file to "deepseek.yaml" in the
# same directory and fill in your real key. The .yaml (non-.example) copy is
# gitignored; this template is the only version committed.
#
# Use it with any pack, via `auto run`:
#   ./auto run gmail-extract --ai deepseek -- --ai-assist
#   ./auto run gmail-categorize --ai deepseek

provider: deepseek        # required — "deepseek" or "claude" (aka "anthropic")

api_key: ""                # required — your DeepSeek API token (from
                            # https://platform.deepseek.com/api_keys)

model: ""                   # optional — overrides the provider's built-in default

api_base: ""                # optional, advanced — overrides the DeepSeek API
                             # endpoint. Leave empty unless you're using a proxy
                             # or a self-hosted/compatible endpoint.
